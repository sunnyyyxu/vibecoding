<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrapLab Chess Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f0e8;--surface:#ffffff;--surface2:#f0ebe0;--border:#d8cfc0;
  --gold:#9a6f20;--gold2:#b8860b;--red:#c0392b;--green:#27ae60;--blue:#2471a3;
  --text:#1a1a1a;--muted:#666;--light-sq:#f0d9b5;--dark-sq:#b58863;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;display:flex;flex-direction:column;overflow-x:hidden;}
body::before{display:none;}
header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--gold);}
.logo span{color:var(--text);}
.badge{font-size:9px;background:var(--gold);color:#000;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.trap-selector{padding:10px 12px;border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;scrollbar-width:none;min-height:40px;background:var(--surface);}
.trap-selector::-webkit-scrollbar{display:none;}
.trap-btn{display:inline-block;padding:7px 14px;margin-right:6px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.trap-btn:hover,.trap-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.1);}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.easy{background:var(--green);}.medium{background:var(--gold);}.hard{background:var(--red);}
.ex-bar{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
.ex-btn{padding:9px 6px;background:var(--surface);border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;line-height:1.4;text-align:center;}
.ex-btn:nth-child(1),.ex-btn:nth-child(2){border-bottom:1px solid var(--border);}
.ex-btn:nth-child(odd){border-right:1px solid var(--border);}
.ex-btn:hover{color:var(--text);background:var(--surface2);}
.ex-btn.sel-atk{background:rgba(201,168,76,0.12);color:var(--gold);border-bottom-color:var(--gold);}
.ex-btn.sel-def{background:rgba(80,144,224,0.12);color:var(--blue);border-bottom-color:var(--blue);}
.ex-btn.disabled{opacity:0.25;cursor:not-allowed;pointer-events:none;}
.app{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
.main{display:flex;flex:1;overflow:hidden;min-height:0;}
@media(max-width:700px){
  .app{flex:none;overflow:visible;}
  .main{flex-direction:column;overflow:visible;}
  .board-side{padding:10px;width:100%;}
  .info-side{border-left:none!important;border-top:1px solid var(--border);overflow:visible;}
  .move-list{max-height:230px!important;overflow-y:auto!important;}
  .square{width:calc((100vw - 24px)/8)!important;height:calc((100vw - 24px)/8)!important;font-size:calc((100vw - 24px)/8*0.68)!important;}
  .board{width:calc(100vw - 20px)!important;}
}
.board-side{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;flex-shrink:0;}
.player-label{font-size:9px;font-weight:700;letter-spacing:1px;text-align:center;padding:3px 0;min-height:18px;text-transform:uppercase;}
.board-container{position:relative;}
.board{display:grid;grid-template-columns:repeat(8,1fr);border:2px solid var(--gold);box-shadow:0 0 30px rgba(201,168,76,0.12),0 16px 50px rgba(0,0,0,0.5);transition:border-color 0.3s,box-shadow 0.3s;}
.board.def-glow{border-color:var(--blue);box-shadow:0 0 30px rgba(80,144,224,0.12),0 16px 50px rgba(0,0,0,0.5);}
.square{width:50px;height:50px;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:background 0.12s;font-size:34px;line-height:1;user-select:none;}
.square.light{background:var(--light-sq);}.square.dark{background:var(--dark-sq);}
.piece-w{color:#fff;text-shadow:-1.5px -1.5px 0 #555,1.5px -1.5px 0 #555,-1.5px 1.5px 0 #555,1.5px 1.5px 0 #555;}
.piece-b{color:#1a1a1a;text-shadow:-1.5px -1.5px 0 #ccc,1.5px -1.5px 0 #ccc,-1.5px 1.5px 0 #ccc,1.5px 1.5px 0 #ccc;}
.square.highlighted{background:rgba(201,168,76,0.5)!important;}
.square.hint-sq::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:rgba(80,200,120,0.4);border:2px solid rgba(80,200,120,0.7);}
.square.hint-def::after{background:rgba(80,144,224,0.4);border-color:rgba(80,144,224,0.7);}
.square.wrong-sq{background:rgba(224,80,80,0.4)!important;}
.square.correct-sq{background:rgba(80,200,120,0.4)!important;}
.square.selected{background:rgba(201,168,76,0.65)!important;}
.coord-file{position:absolute;bottom:1px;right:3px;font-size:8px;font-family:'Space Mono',monospace;opacity:0.55;font-weight:700;}
.coord-rank{position:absolute;top:1px;left:3px;font-size:8px;font-family:'Space Mono',monospace;opacity:0.55;font-weight:700;}
.light .coord-file,.light .coord-rank{color:var(--dark-sq);}
.dark .coord-file,.dark .coord-rank{color:var(--light-sq);}
.info-side{flex:1;display:flex;flex-direction:column;border-left:1px solid var(--border);overflow:hidden;min-width:0;}
.trap-header{padding:11px 14px;border-bottom:1px solid var(--border);}
.ex-label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:3px;}
.ex-label.atk{color:var(--gold);}.ex-label.def{color:var(--blue);}
.trap-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;margin-bottom:3px;}
.trap-name.atk{color:var(--gold);}.trap-name.def{color:var(--blue);}
.trap-desc{font-size:10px;color:var(--muted);line-height:1.6;}
.status-row{display:flex;align-items:center;gap:8px;padding:7px 14px 4px;}
.status-dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite;}
.status-dot.atk{background:var(--gold);}.status-dot.def{background:var(--blue);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.status-text{font-size:10px;color:var(--muted);}
.whose-turn{margin-left:auto;font-size:10px;font-weight:700;}
.progress-bar{height:2px;background:var(--border);margin:0 14px 7px;border-radius:1px;overflow:hidden;}
.progress-fill{height:100%;transition:width 0.4s ease;border-radius:1px;}
.progress-fill.atk{background:var(--gold);}.progress-fill.def{background:var(--blue);}
.move-list{flex:1;overflow-y:auto;padding:8px 14px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.move-item{display:flex;align-items:flex-start;gap:8px;padding:8px;margin-bottom:5px;border-radius:6px;border:1px solid transparent;transition:all 0.2s;opacity:0.32;}
.move-item.act-atk{opacity:1;border-color:var(--gold);background:rgba(154,111,32,0.08);}
.move-item.act-def{opacity:1;border-color:var(--blue);background:rgba(36,113,163,0.08);}
.move-item.done{opacity:0.7;border-color:var(--border);background:var(--surface2);}
.move-num{font-size:10px;font-weight:700;min-width:22px;padding-top:1px;}
.move-num.atk{color:var(--gold);}.move-num.def{color:var(--blue);}
.move-info{flex:1;}
.move-notation{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
.yn-atk{color:var(--gold);}.yn-def{color:var(--blue);}.yn-opp{color:var(--muted);}
.move-explain{font-size:10px;color:var(--muted);line-height:1.5;}
.move-tag{font-size:8px;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;align-self:flex-start;margin-top:2px;}
.t-trap{background:rgba(192,57,43,0.1);color:var(--red);border:1px solid rgba(192,57,43,0.3);}
.t-key{background:rgba(154,111,32,0.1);color:var(--gold);border:1px solid rgba(154,111,32,0.3);}
.t-keyd{background:rgba(36,113,163,0.1);color:var(--blue);border:1px solid rgba(36,113,163,0.3);}
.t-dev{background:rgba(39,174,96,0.1);color:var(--green);border:1px solid rgba(39,174,96,0.3);}
.t-def{background:rgba(36,113,163,0.1);color:var(--blue);border:1px solid rgba(36,113,163,0.3);}
.coach-panel{padding:9px 14px;border-top:1px solid var(--border);background:var(--surface);}
.coach-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;font-weight:700;}
.coach-label.atk{color:var(--gold);}.coach-label.def{color:var(--blue);}
.coach-msg{font-size:11px;color:var(--text);line-height:1.6;min-height:32px;}
.controls{padding:9px 14px;border-top:1px solid var(--border);display:flex;gap:7px;}
.btn{flex:1;padding:9px 4px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--text);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all 0.2s;font-weight:700;text-transform:uppercase;}
.btn:hover{border-color:var(--gold);color:var(--gold);}
.btn.p-atk{background:var(--gold);border-color:var(--gold);color:#000;}
.btn.p-atk:hover{background:var(--gold2);}
.btn.p-def{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn.p-def:hover{background:#7ab0f0;}
.completion{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:50;background:rgba(245,240,232,0.97);}
.completion.show{display:flex;}
.completion.c-atk{border:2px solid var(--gold);}.completion.c-def{border:2px solid var(--blue);}
.comp-icon{font-size:42px;}.comp-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:900;}
.comp-title.atk{color:var(--gold);}.comp-title.def{color:var(--blue);}
.comp-sub{font-size:10px;color:var(--muted);text-align:center;padding:0 20px;line-height:1.7;}
.shake{animation:shake 0.35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
</style>
</head>
<body>
<header>
  <div class="logo">TRAP<span>LAB</span></div>
  <div class="badge">♟ Chess Trainer</div>
</header>
<div class="trap-selector" id="trapSelector"></div>
<div class="ex-bar" id="exBar">
  <button class="ex-btn" id="ex0" onclick="setEx(0)">⚔️ Attack<br>as White</button>
  <button class="ex-btn" id="ex1" onclick="setEx(1)">⚔️ Attack<br>as Black</button>
  <button class="ex-btn" id="ex2" onclick="setEx(2)">🛡 Defend<br>as White</button>
  <button class="ex-btn" id="ex3" onclick="setEx(3)">🛡 Defend<br>as Black</button>
</div>
<div class="app">
  <div class="main">
    <div class="board-side">
      <div class="player-label" id="topLabel"></div>
      <div class="board-container">
        <div class="board" id="board"></div>
        <div class="completion c-atk" id="completion">
          <div class="comp-icon" id="cIcon">♛</div>
          <div class="comp-title atk" id="cTitle">Mastered!</div>
          <div class="comp-sub" id="cSub"></div>
          <button class="btn p-atk" id="cNextBtn" style="width:180px;margin-top:6px" onclick="nextTrap()">Next Trap →</button>
          <button class="btn" style="width:180px" onclick="resetEx()">Practice Again</button>
        </div>
      </div>
      <div class="player-label" id="botLabel"></div>
    </div>
    <div class="info-side">
      <div class="trap-header">
        <div class="ex-label atk" id="exLabel">⚔️ ATTACK · WHITE</div>
        <div class="trap-name atk" id="trapName">Select a trap</div>
        <div class="trap-desc" id="trapDesc">Choose a trap above to begin.</div>
      </div>
      <div class="status-row">
        <div class="status-dot atk" id="statusDot"></div>
        <div class="status-text" id="statusText">Ready</div>
        <div class="whose-turn" id="whoseTurn"></div>
      </div>
      <div class="progress-bar"><div class="progress-fill atk" id="progressFill" style="width:0%"></div></div>
      <div class="move-list" id="moveList"></div>
      <div class="coach-panel">
        <div class="coach-label atk" id="coachLabel">♟ Coach Says</div>
        <div class="coach-msg" id="coachMsg">Pick a trap to start!</div>
      </div>
      <div class="controls">
        <button class="btn" onclick="showHint()">Hint</button>
        <button class="btn" onclick="resetEx()">Reset</button>
        <button class="btn p-atk" id="autoBtn" onclick="autoPlay()">Auto-Play</button>
      </div>
    </div>
  </div>
</div>
<script>
const P={wK:'♔',wQ:'♕',wR:'♖',wB:'♗',wN:'♘',wP:'♙',bK:'♚',bQ:'♛',bR:'♜',bB:'♝',bN:'♞',bP:'♟'};
const INIT={a1:'wR',b1:'wN',c1:'wB',d1:'wQ',e1:'wK',f1:'wB',g1:'wN',h1:'wR',a2:'wP',b2:'wP',c2:'wP',d2:'wP',e2:'wP',f2:'wP',g2:'wP',h2:'wP',a7:'bP',b7:'bP',c7:'bP',d7:'bP',e7:'bP',f7:'bP',g7:'bP',h7:'bP',a8:'bR',b8:'bN',c8:'bB',d8:'bQ',e8:'bK',f8:'bB',g8:'bN',h8:'bR'};
const TRAPS=[{id:'scholars',name:"Scholar's Mate",difficulty:'easy',exercises:{aw:{type:'atk',color:'white',label:'⚔️ ATTACK · AS WHITE',desc:"Execute the Scholar's Mate! Checkmate in 4 moves with queen + bishop targeting f7.",done:"Beautifully played! Scholar's Mate complete. Use this against unprepared opponents!",moves:[{f:'e2',t:'e4',w:'you',n:'1. e4',ex:'Open with king pawn.',tag:'dev'},{f:'e7',t:'e5',w:'them',n:'1... e5',ex:'Black mirrors.',tag:null},{f:'f1',t:'c4',w:'you',n:'2. Bc4',ex:"Bishop aims at f7 — the weakest square near Black's king.",tag:'key'},{f:'b8',t:'c6',w:'them',n:'2... Nc6',ex:"Black develops. Doesn't see the threat.",tag:null},{f:'d1',t:'h5',w:'you',n:'3. Qh5',ex:"Queen to h5! Threatens Qxf7# — and bishop on c4 will protect it on f7. Black will try Nf6 thinking it stops you. It doesn't.",tag:'trap'},{f:'g8',t:'f6',w:'them',n:'3... Nf6??',ex:"Black attacks the queen — looks smart! But bishop on c4 means Qxf7# works anyway.",tag:null},{f:'h5',t:'f7',w:'you',n:'4. Qxf7#',ex:"CHECKMATE! Bishop on c4 protects the queen on f7. Black's Nf6 was a blunder — it didn't stop anything!",tag:'trap'}]},ab:{type:'atk',color:'black',label:"⚔️ ATTACK · AS BLACK",desc:"Fool's Mate — the fastest possible checkmate! Only 2 moves. White has to play very badly, but it happens!",done:"Fool's Mate! The fastest checkmate in chess — 2 moves. White opened both diagonals to their king.",moves:[{f:'f2',t:'f3',w:'them',n:'1. f3',ex:'White plays a terrible move — opens the king diagonal.',tag:null},{f:'e7',t:'e5',w:'you',n:'1... e5',ex:'Claim the center.',tag:'dev'},{f:'g2',t:'g4',w:'them',n:'2. g4??',ex:'White plays another awful move — opens the h4-e1 diagonal completely!',tag:null},{f:'d8',t:'h4',w:'you',n:'2... Qh4#',ex:'CHECKMATE! Queen to h4 — the king on e1 is trapped with no escape. Fastest mate in chess!',tag:'trap'}]},db:{type:'def',color:'black',label:'🛡 DEFEND · AS BLACK',desc:"White is going for Scholar's Mate against you. Nf6 + g6 shuts it down cold.",done:" te solidifies but buries c1 bishop forever.',tag:null},{f:'e8',t:'g8',w:'you',n:"4... 0-0",ex:"Castle! You're ahead in development.",tag:'key'},{f:'f1',t:'d3',w:'them',n:'5. Bd3',ex:'White tries to activate.',tag:null},{f:'d7',t:'d5',w:'you',n:'5... d5!',ex:'Strike the center! c1 bishop still buried.',tag:'key'}]},aw:{type:'atk',color:'white',label:'⚔️ ATTACK · AS WHITE',desc:"Build a big center with d4+c4 as White and punish Black if they don't challenge it correctly.",done:"Dominant center achieved! Your space advantage and bishop pair are overwhelming.",moves:[{f:'d2',t:'d4',w:'you',n:'1. d4',ex:"Queen's pawn — space and control.",tag:'dev'},{f:'g8',t:'f6',w:'them',n:'1... Nf6',ex:'Black develops.',tag:null},{f:'c2',t:'c4',w:'you',n:'2. c4',ex:'Build the big center.',tag:'key'},{f:'e7',t:'e6',w:'them',n:'2... e6',ex:'Black prepares d5 or Bb4.',tag:null},{f:'b1',t:'c3',w:'you',n:'3. Nc3',ex:'Develop and support d4.',tag:'dev'},{f:'d7',t:'d5',w:'them',n:'3... d5',ex:'Black challenges the center.',tag:null},{f:'c4',t:'d5',w:'you',n:'4. cxd5!',ex:'Take — open the c-file.',tag:'key'},{f:'e6',t:'d5',w:'them',n:'4... exd5',ex:'Black recaptures.',tag:null},{f:'f1',t:'c4',w:'you',n:'5. Bc4!',ex:'Develop bishop actively — eyes the f7 weak point.',tag:'key'},{f:'f8',t:'d6',w:'them',n:'5... Bd6',ex:'Black develops.',tag:null},{f:'f4',t:'d6',w:'you',n:'6. Bxd6!',ex:"Trade Black's best bishop. Your position is dominant.",tag:'trap'}]},dw:{type:'def',color:'white',label:'🛡 DEFEND · AS WHITE',desc:"Black pins your c3 knight with Bb4 (Nimzo). Play a3 — the Sämisch — force the trade on your terms.",done:"Nimzo handled with a3! Bishop pair in hand, the pin is gone. White is doing great.",moves:[{f:'d2',t:'d4',w:'you',n:'1. d4',ex:"Your Queen's pawn.",tag:'dev'},{f:'g8',t:'f6',w:'them',n:'1... Nf6',ex:'Black develops.',tag:null},{f:'c2',t:'c4',w:'you',n:'2. c4',ex:'Build center.',tag:'dev'},{f:'e7',t:'e6',w:'them',n:'2... e6',ex:'Black prepares Nimzo.',tag:null},{f:'b1',t:'c3',w:'you',n:'3. Nc3',ex:'Develop — the pin is coming but you have an answer.',tag:'dev'},{f:'f8',t:'b4',w:'them',n:'3... Bb4',ex:'⚠️ The Nimzo pin! Knight is pinned.',tag:'trap'},{f:'a2',t:'a3',w:'you',n:'4. a3!',ex:'Sämisch! Force the bishop to trade or retreat.',tag:'def'},{f:'b4',t:'c3',w:'them',n:'4... Bxc3+',ex:'Black trades bishop for knight.',tag:null},{f:'b2',t:'c3',w:'you',n:'5. bxc3',ex:'Recapture. Doubled pawns but you have the BISHOP PAIR!',tag:'key'},{f:'d7',t:'d5',w:'them',n:'5... d5',ex:'Black fights for center.',tag:null},{f:'c4',t:'d5',w:'you',n:'6. cxd5!',ex:'Take it! Open lines for your bishops.',tag:'key'}]},db:{type:'def',color:'black',label:'🛡 DEFEND · AS BLACK',desc:"You play the Nimzo and White plays a3 (Sämisch). Trade the bishop confidently — the compensation is real.",done:"Nimzo defense complete! Doubled White pawns, active pieces, and a closed position. Excellent play!",moves:[{f:'d2',t:'d4',w:'them',n:'1. d4',ex:'White opens.',tag:null},{f:'g8',t:'f6',w:'you',n:'1... Nf6',ex:'Develop.',tag:'dev'},{f:'c2',t:'c4',w:'them',n:'2. c4',ex:'White builds center.',tag:null},{f:'e7',t:'e6',w:'you',n:'2... e6',ex:'Prepare the Nimzo.',tag:'dev'},{f:'b1',t:'c3',w:'them',n:'3. Nc3',ex:'White develops knight.',tag:null},{f:'f8',t:'b4',w:'you',n:'3... Bb4!',ex:'THE PIN! Knight is stuck.',tag:'trap'},{f:'a2',t:'a3',w:'them',n:'4. a3',ex:'⚠️ Sämisch! White forces a decision.',tag:'trap'},{f:'b4',t:'c3',w:'you',n:'4... Bxc3+!',ex:'Trade confidently! You WANT to give White doubled pawns.',tag:'def'},{f:'b2',t:'c3',w:'them',n:'5. bxc3',ex:'White gets doubled pawns and bishop pair.',tag:null},{f:'e8',t:'g8',w:'you',n:'5... 0-0!',ex:'Castle immediately. King safe, development complete.',tag:'key'},{f:'g1',t:'f3',w:'them',n:'6. Nf3',ex:'White develops knight — preparing to use the bishop pair.',tag:null},{f:'d7',t:'d6',w:'you',n:'6... d6!',ex:'Solid — prepares e5 to close the position and neutralize the bishops.',tag:'key'}]}}}];
let trap=null,exIdx=0,moveIdx=0,boardState={},sel=null,autoTimer=null,hinted=false,sessionId=0;
const EX_KEYS=['aw','ab','dw','db'];
function getEx(){return trap&&trap.exercises[EX_KEYS[exIdx]]||null;}
function isAtk(){const e=getEx();return e&&e.type==='atk';}
function isFlipped(){const e=getEx();return e&&e.color==='black';}
function setEx(i){if(!trap)return;const key=EX_KEYS[i];if(!trap.exercises[key])return;exIdx=i;updateExBar();loadEx();}
function updateExBar(){if(!trap)return;EX_KEYS.forEach((k,i)=>{const btn=document.getElementById('ex'+i);const ex=trap.exercises[k];if(!ex){btn.classList.add('disabled');btn.classList.remove('sel-atk','sel-def');return;}btn.classList.remove('disabled','sel-atk','sel-def');if(i===exIdx)btn.classList.add(ex.type==='atk'?'sel-atk':'sel-def');});}
function sqName(c,r){return 'abcdefgh'[c]+(8-r);}
function renderBoard(){const el=document.getElementById('board');el.innerHTML='';const flip=isFlipped();for(let r=0;r<8;r++){for(let c=0;c<8;c++){const ar=flip?7-r:r,ac=flip?7-c:c;const s=sqName(ac,ar),light=(ar+ac)%2===0;const d=document.createElement('div');d.className='square '+(light?'light':'dark');d.dataset.sq=s;if(boardState[s]){const sp=document.createElement('span');sp.className=boardState[s][0]==='w'?'piece-w':'piece-b';sp.textContent=P[boardState[s]];d.appendChild(sp);}if(c===7){const x=document.createElement('span');x.className='coord-rank';x.textContent=8-ar;d.appendChild(x);}if(r===7){const x=document.createElement('span');x.className='coord-file';x.textContent='abcdefgh'[ac];d.appendChild(x);}d.addEventListener('click',()=>onClick(s));el.appendChild(d);}}updateLabels();}
function getSqEl(s){return document.querySelector('[data-sq="'+s+'"]');}
function clearHL(){document.querySelectorAll('.square').forEach(e=>e.classList.remove('highlighted','hint-sq','hint-def','wrong-sq','correct-sq','selected'));}
function hl(s,cls){const e=getSqEl(s);if(e)e.classList.add(cls);}
function updateLabels(){const ex=getEx();if(!ex){document.getElementById('topLabel').textContent='';document.getElementById('botLabel').textContent='';return;}const flip=isFlipped();const youColor=ex.color==='white'?'⬜ YOU (WHITE)':'⬛ YOU (BLACK)';const oppColor=ex.color==='white'?'⬛ OPPONENT':'⬜ OPPONENT';document.getElementById('topLabel').textContent=flip?youColor:oppColor;document.getElementById('botLabel').textContent=flip?oppColor:youColor;document.getElementById('botLabel').style.cssText=isAtk()?'color:var(--gold)':'color:var(--blue)';document.getElementById('topLabel').style.cssText='color:var(--muted)';}
function loadEx(){clearInterval(autoTimer);sessionId++;moveIdx=0;sel=null;hinted=false;boardState={...INIT};const ex=getEx();if(!ex)return;const atk=isAtk();document.getElementById('board').classList.toggle('def-glow',!atk);document.getElementById('exLabel').className='ex-label '+(atk?'atk':'def');document.getElementById('exLabel').textContent=ex.label;document.getElementById('trapName').className='trap-name '+(atk?'atk':'def');document.getElementById('trapName').textContent=trap.name;document.getElementById('trapDesc').textContent=ex.desc;document.getElementById('statusDot').className='status-dot '+(atk?'atk':'def');document.getElementById('progressFill').className='progress-fill '+(atk?'atk':'def');document.getElementById('coachLabel').className='coach-label '+(atk?'atk':'def');document.getElementById('autoBtn').className='btn '+(atk?'p-atk':'p-def');const comp=document.getElementById('completion');comp.classList.remove('show','c-atk','c-def');comp.classList.add(atk?'c-atk':'c-def');document.getElementById('cIcon').textContent=atk?'♛':'🛡';document.getElementById('cTitle').className='comp-title '+(atk?'atk':'def');document.getElementById('cTitle').textContent=atk?'Trap Mastered!':'Defense Mastered!';document.getElementById('cNextBtn').className='btn '+(atk?'p-atk':'p-def');renderBoard();renderMoveList();updateProg();updateStat();const first=ex.moves[0];if(first&&first.w==='them')setTimeout(()=>oppMoves(),500);else if(first){coach(first.ex);hl(first.f,'highlighted');}}
function renderMoveList(){const list=document.getElementById('moveList');list.innerHTML='';const ex=getEx();if(!ex)return;const atk=isAtk();ex.moves.forEach((m,i)=>{const d=document.createElement('div');d.className='move-item';d.id='mi'+i;let tagH='';if(m.tag){const tc={trap:'t-trap',key:atk?'t-key':'t-keyd',dev:'t-dev',def:'t-def'}[m.tag]||'t-key';const tt={trap:'☠ TRAP',key:'★ KEY',dev:'◆ DEV',def:'🛡 DEFEND'}[m.tag]||m.tag;tagH=`<span class="move-tag ${tc}">${tt}</span>`;}const nc=m.w==='you'?(atk?'yn-atk':'yn-def'):'yn-opp';const nmC='move-num '+(atk?'atk':'def');d.innerHTML=`<div class="${nmC}">${Math.floor(i/2)+1}${i%2===0?'.':'...'}</div><div class="move-info"><div class="move-notation"><span class="${nc}">${m.n}</span></div><div class="move-explain">${m.ex}</div></div>${tagH}`;list.appendChild(d);});activeMi(0);}
function activeMi(i){const atk=isAtk();document.querySelectorAll('.move-item').forEach((e,j)=>{e.classList.remove('act-atk','act-def','done');if(j<i)e.classList.add('done');});const e=document.getElementById('mi'+i);if(e){e.classList.add(atk?'act-atk':'act-def');e.scrollIntoView({behavior:'smooth',block:'nearest'});}}
function onClick(s){const ex=getEx();if(!ex)return;const m=ex.moves[moveIdx];if(!m||m.w!=='you')return;clearHL();const myCol=ex.color==='white'?'w':'b';if(!sel){if(boardState[s]&&boardState[s][0]===myCol){if(s===m.f){sel=s;hl(s,'selected');}else{hl(s,'wrong-sq');coach("That's not the right piece!");setTimeout(()=>{clearHL();hl(m.f,'highlighted');},800);}}return;}if(s===m.t){execMove(m);sel=null;hl(m.f,'correct-sq');hl(m.t,'correct-sq');moveIdx++;updateProg();activeMi(moveIdx);setTimeout(()=>{clearHL();moveIdx>=ex.moves.length?showComp():oppMoves();},500);}else if(boardState[s]&&boardState[s][0]===myCol){sel=s;hl(s,'selected');}else{hl(s,'wrong-sq');document.getElementById('board').classList.add('shake');setTimeout(()=>document.getElementById('board').classList.remove('shake'),350);coach("Not quite! "+(hinted?`Move ${m.f.toUpperCase()} → ${m.t.toUpperCase()}.`:"Tap Hint if stuck."));sel=null;setTimeout(()=>{clearHL();hl(m.f,'highlighted');},600);}}
function execMove(m){boardState[m.t]=boardState[m.f];delete boardState[m.f];if(m.f==='e1'&&m.t==='g1'){boardState['f1']='wR';delete boardState['h1'];}if(m.f==='e8'&&m.t==='g8'){boardState['f8']='bR';delete boardState['h8'];}renderBoard();}
function oppMoves(){const ex=getEx();if(!ex)return;const mySession=sessionId;const run=()=>{if(sessionId!==mySession)return;if(moveIdx>=ex.moves.length){showComp();return;}const m=ex.moves[moveIdx];if(m.w==='them'){updateStat('Opponent thinking...');setTimeout(()=>{if(sessionId!==mySession)return;clearHL();hl(m.f,'highlighted');setTimeout(()=>{if(sessionId!==mySession)return;execMove(m);hl(m.f,'correct-sq');hl(m.t,'correct-sq');moveIdx++;updateProg();activeMi(moveIdx);setTimeout(()=>{if(sessionId!==mySession)return;clearHL();if(moveIdx>=ex.moves.length)showComp();else if(ex.moves[moveIdx].w==='them')run();else{const n=ex.moves[moveIdx];coach(n.ex);hl(n.f,'highlighted');updateStat('Your turn');}},400);},500);},300);}else{const n=ex.moves[moveIdx];coach(n.ex);hl(n.f,'highlighted');updateStat('Your turn');}};run();}
function showHint(){const ex=getEx();if(!ex)return;const m=ex.moves[moveIdx];if(!m||m.w!=='you')return;hinted=true;clearHL();hl(m.f,'hint-sq');hl(m.t,'hint-sq');if(!isAtk()){getSqEl(m.f)?.classList.add('hint-def');getSqEl(m.t)?.classList.add('hint-def');}coach(`Hint: ${m.f.toUpperCase()} → ${m.t.toUpperCase()}. ${m.ex}`);}
function autoPlay(){const ex=getEx();if(!ex)return;clearInterval(autoTimer);const mySession=sessionId;const run=()=>{if(sessionId!==mySession)return;if(moveIdx>=ex.moves.length){showComp();return;}const m=ex.moves[moveIdx];coach(m.ex);clearHL();hl(m.f,'highlighted');setTimeout(()=>{if(sessionId!==mySession)return;execMove(m);hl(m.f,'correct-sq');hl(m.t,'correct-sq');moveIdx++;updateProg();activeMi(moveIdx);setTimeout(()=>{if(sessionId!==mySession)return;clearHL();moveIdx<ex.moves.length?autoTimer=setTimeout(run,1000):showComp();},400);},700);};run();}
function resetEx(){clearInterval(autoTimer);if(trap)loadEx();}
function nextTrap(){const i=TRAPS.findIndex(t=>t.id===trap.id);const next=TRAPS[(i+1)%TRAPS.length];document.querySelectorAll('.trap-btn').forEach((b,j)=>b.classList.toggle('active',TRAPS[j].id===next.id));loadTrap(next);}
function showComp(){const ex=getEx();document.getElementById('cSub').textContent=ex.done;document.getElementById('completion').classList.add('show');updateStat('Complete! ✓');}
function coach(msg){document.getElementById('coachMsg').textContent=msg;}
function updateProg(){const ex=getEx();if(!ex)return;document.getElementById('progressFill').style.width=(moveIdx/ex.moves.length*100)+'%';}
function updateStat(ov){const ex=getEx();if(!ex)return;const m=ex.moves[moveIdx];document.getElementById('statusText').textContent=ov||(m?(m.w==='you'?'Your move':"Opponent's turn"):'Complete');document.getElementById('whoseTurn').textContent=(!ov&&m&&m.w==='you')?(ex.color==='white'?'⬜ WHITE':'⬛ BLACK'):'';}
function loadTrap(t){trap=t;const currentKey=EX_KEYS[exIdx];if(!t.exercises[currentKey]){const available=EX_KEYS.findIndex(k=>t.exercises[k]);exIdx=available>=0?available:0;}updateExBar();loadEx();}
function buildSelector(){const c=document.getElementById('trapSelector');TRAPS.forEach((t,i)=>{const b=document.createElement('button');b.className='trap-btn'+(i===0?' active':'');b.innerHTML=`<span class="dot ${t.difficulty}"></span>${t.name}`;b.onclick=()=>{document.querySelectorAll('.trap-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');loadTrap(t);};c.appendChild(b);});}
buildSelector();
loadTrap(TRAPS[0]);
</script>
