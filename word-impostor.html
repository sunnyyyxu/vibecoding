<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Word Impostor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;color:#f0ede8;font-family:'DM Mono',monospace;min-height:100vh;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CATEGORIES = {
  "🍕 Food": ["Pizza","Sushi","Taco","Waffle","Ramen","Croissant","Dumpling","Pretzel","Avocado","Fondue"],
  "🏖️ Vacation": ["Beach","Sunscreen","Snorkeling","Hammock","Margarita","Passport","Sandcastle","Sunburn","Buffet","Jet lag"],
  "🎬 Movies": ["Popcorn","Villain","Sequel","Trailer","Subplot","Cliffhanger","Cameo","Reboot","Flashback","Montage"],
  "🐾 Animals": ["Penguin","Platypus","Capybara","Flamingo","Sloth","Narwhal","Axolotl","Pangolin","Okapi","Quokka"],
  "🏙️ City Life": ["Subway","Gridlock","Rooftop","Bodega","Brunch","Commute","Skyline","Hustle","Delivery","Parking"],
  "🎵 Music": ["Chorus","Riff","Bridge","Drop","Vinyl","Reverb","Encore","Falsetto","Bassline","Breakdown"],
};

const BOTS = ["🤖 Aria","🦾 Blaze","🧠 Cipher"];
const ALL_PLAYERS = ["You",...BOTS];

async function getBotClue(botName, word, category, round, isImposter, previousClues) {
  const systemPrompt = isImposter
    ? `You are the IMPOSTER in a word party game. You do NOT know the secret word. Give ONE word that sounds like a reasonable clue for the category "${category}" without revealing you don't know the real word. Be vague-but-plausible. CRITICAL: Do NOT repeat any of these already-used words: [${previousClues.join(", ")||"none"}]. Respond with ONLY one single word. No punctuation, no explanation.`
    : `You are playing a word party game. The secret word is "${word}" (category: "${category}"). Give ONE word as a clue that hints at the secret word without being too obvious. Do not say the word itself or a direct synonym. CRITICAL: Do NOT repeat any of these already-used words: [${previousClues.join(", ")||"none"}]. Round ${round} of 3. Respond with ONLY one single word. No punctuation, no explanation.`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:20,system:systemPrompt,messages:[{role:"user",content:"Give your one-word clue now."}]})});
    const data = await res.json();
    const text = data.content?.[0]?.text?.trim().split(/\s+/)[0]||"Hmm";
    const cleaned = text.replace(/[^a-zA-Z]/g,"")||"Interesting";
    if(previousClues.map(c=>c.toLowerCase()).includes(cleaned.toLowerCase())){
      const fallbacks=["Enigmatic","Curious","Notable","Distinct","Vivid","Sharp","Bold","Cryptic","Subtle","Layered","Textured","Abstract","Dense","Rare","Peculiar"];
      const available=fallbacks.filter(f=>!previousClues.map(c=>c.toLowerCase()).includes(f.toLowerCase()));
      return available[Math.floor(Math.random()*available.length)]||"Unique";
    }
    return cleaned;
  } catch {
    const fallbacks=["Mysterious","Curious","Notable","Distinct","Classic","Vivid","Sharp","Bold"];
    return fallbacks[Math.floor(Math.random()*fallbacks.length)];
  }
}

async function getBotGuess(botName, category, clues, isImposter) {
  const systemPrompt = `You are playing an imposter word game. Everyone gave one-word clues. Your job is to guess who the imposter is.\n\nCategory: "${category}"\nClues given (Player: Clue):\n${clues.map(c=>`${c.player}: "${c.clue}"`).join("\n")}\n\nThe imposter didn't know the secret word and tried to blend in. Look for clues that seem vague, off-topic, or generic.\n\nRespond with ONLY the name of who you think is the imposter from this list: ${ALL_PLAYERS.join(", ")}. One name only.`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:20,system:systemPrompt,messages:[{role:"user",content:"Who is the imposter?"}]})});
    const data = await res.json();
    const text = data.content?.[0]?.text?.trim()||"";
    const found = ALL_PLAYERS.find(p=>text.includes(p));
    return found||ALL_PLAYERS[Math.floor(Math.random()*ALL_PLAYERS.length)];
  } catch {
    return ALL_PLAYERS[Math.floor(Math.random()*ALL_PLAYERS.length)];
  }
}

async function getImposterWordGuess(category, clues, imposterName) {
  const innocentClues = clues.filter(c=>c.player!==imposterName);
  const systemPrompt = `You were the imposter in a word game. Based on the clues the OTHER (innocent) players gave, guess what the secret word was.\n\nCategory: "${category}"\nClues from innocent players:\n${innocentClues.map(c=>`${c.player}: "${c.clue}"`).join("\n")}\n\nRespond with ONLY the single word you think the secret word was. No explanation.`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:20,system:systemPrompt,messages:[{role:"user",content:"What was the secret word?"}]})});
    const data = await res.json();
    return data.content?.[0]?.text?.trim().split(/\s+/)[0]?.replace(/[^a-zA-Z]/g,"")||"Unknown";
  } catch { return "Unknown"; }
}

function SetupScreen({onStart}) {
  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"48px 24px",background:"#0a0a0f"}}>
      <div style={{maxWidth:480,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:10,letterSpacing:4,color:"#ff4d6d",marginBottom:16,fontFamily:"'DM Mono',monospace"}}>A PARTY WORD GAME</div>
        <h1 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(72px,18vw,108px)",lineHeight:0.9,letterSpacing:2,background:"linear-gradient(135deg,#f0ede8,#ff4d6d)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:24}}>WORD<br/>IMPOSTOR</h1>
        <p style={{fontSize:13,lineHeight:1.7,color:"#888",marginBottom:36,fontFamily:"'DM Mono',monospace"}}>3 rounds, 4 players. One person doesn't know the word.<br/>Give clues. Spot the fake. Don't get caught.</p>
        <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:32}}>
          {[{icon:"🧠",name:"Play as Innocent",sub:"You know the word. Hint without being obvious.",val:false},{icon:"🕵️",name:"Play as Imposter",sub:"You don't know the word. Blend in.",val:true}].map(r=>(
            <button key={r.name} onClick={()=>onStart(r.val)} style={{display:"flex",alignItems:"center",gap:14,background:"#14141c",border:"1px solid #222",borderRadius:12,padding:"18px 20px",cursor:"pointer",textAlign:"left",color:"#f0ede8",fontFamily:"'DM Mono',monospace",transition:"all 0.2s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#ff4d6d";e.currentTarget.style.background="#1a1020"}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#222";e.currentTarget.style.background="#14141c"}}>
              <span style={{fontSize:28,flexShrink:0}}>{r.icon}</span>
              <div>
                <div style={{fontSize:15,fontWeight:500,marginBottom:4}}>{r.name}</div>
                <div style={{fontSize:11,color:"#666"}}>{r.sub}</div>
              </div>
            </button>
          ))}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
          {Object.keys(CATEGORIES).map(c=>(
            <span key={c} style={{background:"#1a1a24",border:"1px solid #2a2a38",borderRadius:20,padding:"4px 12px",fontSize:11,color:"#666",fontFamily:"'DM Mono',monospace"}}>{c}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [phase, setPhase] = useState("setup");
  const [category, setCategory] = useState("");
  const [word, setWord] = useState("");
  const [playerIsImposter, setPlayerIsImposter] = useState(false);
  const [imposter, setImposter] = useState("");
  const [playerOrder, setPlayerOrder] = useState([]);
  const [turnIndex, setTurnIndex] = useState(0);
  const [clues, setClues] = useState([]);
  const [playerInput, setPlayerInput] = useState("");
  const [inputError, setInputError] = useState("");
  const [loading, setLoading] = useState(false);
  const [playerVote, setPlayerVote] = useState("");
  const [botVotes, setBotVotes] = useState({});
  const [votingLoading, setVotingLoading] = useState(false);
  const [imposterGuessedWord, setImposterGuessedWord] = useState("");
  const [playerWordGuess, setPlayerWordGuess] = useState("");
  const [playerWordGuessError, setPlayerWordGuessError] = useState("");
  const [revealLoading, setRevealLoading] = useState(false);
  const inputRef = useRef(null);
  const cluesRef = useRef([]);
  const cluesEndRef = useRef(null);
  const botGuessTriggered = useRef(false);

  function startGame(wantImposter) {
    const cats = Object.keys(CATEGORIES);
    const chosenCat = cats[Math.floor(Math.random()*cats.length)];
    const words = CATEGORIES[chosenCat];
    const chosenWord = words[Math.floor(Math.random()*words.length)];
    const actualImposter = wantImposter ? "You" : BOTS[Math.floor(Math.random()*BOTS.length)];
    const shuffled = [...ALL_PLAYERS].sort(()=>Math.random()-0.5);
    setCategory(chosenCat); setWord(chosenWord);
    setPlayerIsImposter(wantImposter); setImposter(actualImposter);
    setPlayerOrder(shuffled); setTurnIndex(0); setClues([]);
    setPlayerInput(""); setPlayerVote(""); setBotVotes({});
    setImposterGuessedWord(""); setPlayerWordGuess("");
    botGuessTriggered.current = false;
    setPhase("playing");
  }

  const currentPlayer = playerOrder[turnIndex % playerOrder.length];
  const isPlayerTurn = currentPlayer === "You";
  const currentRound = Math.floor(turnIndex / (playerOrder.length||1)) + 1;

  useEffect(()=>{ cluesRef.current = clues; },[clues]);
  useEffect(()=>{ cluesEndRef.current?.scrollIntoView({behavior:"smooth"}); },[clues.length]);

  useEffect(()=>{
    if(phase!=="playing") return;
    if(isPlayerTurn){ setTimeout(()=>inputRef.current?.focus(),100); return; }
    if(loading) return;
    const doBot = async()=>{
      setLoading(true);
      await new Promise(r=>setTimeout(r,900+Math.random()*700));
      const botIsImposter = currentPlayer===imposter;
      const usedWords = cluesRef.current.map(c=>c.clue.toLowerCase());
      let clue = await getBotClue(currentPlayer,word,category,currentRound,botIsImposter,usedWords);
      const fallbacks=["Enigmatic","Peculiar","Obscure","Textured","Layered","Nuanced","Cryptic","Subtle","Dense","Abstract","Vivid","Sharp","Rare","Resonant","Distinct"];
      let attempts=0;
      while(cluesRef.current.map(c=>c.clue.toLowerCase()).includes(clue.toLowerCase())&&attempts<5){
        const available=fallbacks.filter(f=>!cluesRef.current.map(c=>c.clue.toLowerCase()).includes(f.toLowerCase()));
        clue=available[Math.floor(Math.random()*available.length)]||`Clue${Date.now()}`;
        attempts++;
      }
      addClue(currentPlayer,clue);
      setLoading(false);
    };
    doBot();
  },[turnIndex,phase]);

  function addClue(player,clue) {
    const newClue={player,clue,round:currentRound,susCount:0};
    setClues(prev=>{
      const updated=[...prev,newClue];
      const newTurnIndex=turnIndex+1;
      if(newTurnIndex>=playerOrder.length*3) setPhase("voting");
      else setTurnIndex(newTurnIndex);
      return updated;
    });
  }

  function submitPlayerClue() {
    if(!playerInput.trim()) return;
    const w=playerInput.trim().split(/\s+/)[0];
    if(clues.map(c=>c.clue.toLowerCase()).includes(w.toLowerCase())){
      setInputError(`"${w}" was already said!`); return;
    }
    setInputError(""); addClue("You",w); setPlayerInput("");
  }

  function toggleSus(idx) {
    setClues(prev=>prev.map((c,i)=>i===idx?{...c,susCount:c.susCount===0?1:0}:c));
  }

  async function submitVotes() {
    if(!playerVote) return;
    setVotingLoading(true);
    const votes={};
    for(const bot of BOTS){
      votes[bot]=await getBotGuess(bot,category,clues,bot===imposter);
      await new Promise(r=>setTimeout(r,400));
    }
    setBotVotes(votes); setVotingLoading(false); setPhase("imposterGuess");
  }

  async function triggerBotImposterGuess() {
    if(botGuessTriggered.current) return;
    botGuessTriggered.current=true;
    setRevealLoading(true);
    const guess=await getImposterWordGuess(category,cluesRef.current,imposter);
    setImposterGuessedWord(guess); setRevealLoading(false); setPhase("reveal");
  }

  function submitPlayerImposterGuess() {
    const guess=playerWordGuess.trim().split(/\s+/)[0];
    if(!guess){setPlayerWordGuessError("Type your guess!");return;}
    setPlayerWordGuessError(""); setImposterGuessedWord(guess); setPhase("reveal");
  }

  const allVotes = phase==="reveal"||phase==="imposterGuess" ? [
    {voter:"You",voted:playerVote},
    ...Object.entries(botVotes).map(([voter,voted])=>({voter,voted}))
  ] : [];

  const voteMap={};
  allVotes.forEach(({voted})=>{if(voted)voteMap[voted]=(voteMap[voted]||0)+1;});
  const topVoted=Object.entries(voteMap).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const groupCaughtImposter=topVoted===imposter;
  const imposterGuessCorrect=imposterGuessedWord?.toLowerCase().trim()===word?.toLowerCase().trim();

  if(phase==="setup") return <SetupScreen onStart={startGame}/>;

  return (
    <div style={{minHeight:"100vh",background:"#0a0a0f",color:"#f0ede8",fontFamily:"'DM Mono',monospace",display:"flex",flexDirection:"column",alignItems:"center"}}>

      {/* Header */}
      <div style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:"1px solid #1a1a24",background:"#0a0a0f"}}>
        <div style={{background:"#1a1020",border:"1px solid #ff4d6d33",borderRadius:20,padding:"4px 12px",fontSize:11,color:"#ff4d6d"}}>{category}</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3}}>WORD IMPOSTOR</div>
        <div style={{fontSize:11,color:"#555"}}>Round {Math.min(currentRound,3)} / 3</div>
      </div>

      {/* Word card */}
      <div style={{width:"100%",maxWidth:480,margin:"20px auto 0",background:"#111118",border:"1px solid #222",borderRadius:14,padding:"18px 24px",display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
        <div style={{fontSize:9,letterSpacing:3,color:"#555"}}>{playerIsImposter?"YOUR ROLE":"SECRET WORD"}</div>
        {playerIsImposter
          ? <div style={{fontSize:20,color:"#ff4d6d",marginTop:4}}>🕵️ IMPOSTER — No word for you!</div>
          : <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:42,letterSpacing:2}}>{word}</div>
        }
      </div>

      {/* Clues */}
      <div style={{width:"100%",maxWidth:480,margin:"16px auto 0",padding:"0 16px"}}>
        <div style={{fontSize:9,letterSpacing:3,color:"#555",marginBottom:8}}>CLUES SO FAR</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {clues.length===0&&<div style={{fontSize:12,color:"#333",padding:"8px 0"}}>No clues yet…</div>}
          {clues.map((c,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:c.susCount?"#1a0f13":"#111118",border:`1px solid ${c.susCount?"#ff4d6d55":"#1e1e2a"}`,borderRadius:10,padding:"10px 14px",transition:"border-color 0.2s"}}>
              <span style={{fontSize:11,color:"#666",minWidth:52}}>{c.player}</span>
              <span style={{fontSize:16,fontWeight:500,flex:1}}>"{c.clue}"</span>
              {phase==="playing"&&(
                <button onClick={()=>toggleSus(i)} style={{fontSize:10,background:c.susCount?"#2a0f13":"#1a1a24",border:`1px solid ${c.susCount?"#ff4d6d":"#2a2a38"}`,borderRadius:20,padding:"3px 10px",cursor:"pointer",color:c.susCount?"#ff4d6d":"#888",whiteSpace:"nowrap",fontFamily:"'DM Mono',monospace"}}>
                  {c.susCount?"🚩 SUS":"👀 Sus?"}
                </button>
              )}
              {c.susCount>0&&phase!=="playing"&&<span>🚩</span>}
            </div>
          ))}
          <div ref={cluesEndRef}/>
        </div>
      </div>

      {/* Playing */}
      {phase==="playing"&&(
        <div style={{width:"100%",maxWidth:480,margin:"20px auto 0",padding:"0 16px"}}>
          {loading&&!isPlayerTurn?(
            <div style={{background:"#111118",border:"1px solid #1e1e2a",borderRadius:14,padding:"18px 20px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:14,color:"#888"}}>{currentPlayer}</span>
              <span style={{fontSize:20,color:"#ff4d6d"}}>...</span>
            </div>
          ):isPlayerTurn?(
            <div style={{background:"#111118",border:"1px solid #ff4d6d55",borderRadius:14,padding:"18px 20px"}}>
              <div style={{fontSize:10,letterSpacing:3,color:"#ff4d6d",marginBottom:12}}>⚡ YOUR TURN</div>
              <div style={{display:"flex",gap:10}}>
                <input ref={inputRef} placeholder="One word clue…" value={playerInput}
                  onChange={e=>{setPlayerInput(e.target.value);setInputError("");}}
                  onKeyDown={e=>e.key==="Enter"&&submitPlayerClue()} maxLength={24}
                  style={{flex:1,background:"#0a0a0f",border:"1px solid #2a2a38",borderRadius:10,padding:"12px 16px",fontFamily:"'DM Mono',monospace",fontSize:16,color:"#f0ede8",outline:"none"}}/>
                <button onClick={submitPlayerClue} style={{background:"#ff4d6d",border:"none",borderRadius:10,padding:"12px 18px",fontSize:18,cursor:"pointer",color:"#fff"}}>→</button>
              </div>
              {inputError&&<div style={{fontSize:11,color:"#ff4d6d",marginTop:6}}>{inputError}</div>}
              <div style={{fontSize:10,color:"#444",marginTop:8}}>Press Enter or → to submit</div>
            </div>
          ):(
            <div style={{fontSize:13,color:"#444",padding:"12px 0"}}>Waiting for {currentPlayer}…</div>
          )}
          <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}}>
            {playerOrder.map(p=>(
              <div key={p} style={{background:p===currentPlayer?"#ff4d6d22":"#14141c",border:`1px solid ${p===currentPlayer?"#ff4d6d":"#222"}`,borderRadius:20,padding:"4px 12px",fontSize:11,color:p===currentPlayer?"#ff4d6d":"#555",transition:"all 0.2s"}}>
                {p==="You"?"You":p.split(" ")[1]}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Voting */}
      {phase==="voting"&&(
        <div style={{width:"100%",maxWidth:480,margin:"24px auto 0",padding:"0 16px"}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:2,marginBottom:16}}>🗳️ WHO IS THE IMPOSTER?</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
            {ALL_PLAYERS.map(p=>(
              <button key={p} onClick={()=>setPlayerVote(p)}
                style={{background:playerVote===p?"#1a0f13":"#111118",border:`1px solid ${playerVote===p?"#ff4d6d":"#222"}`,borderRadius:12,padding:"14px 20px",fontFamily:"'DM Mono',monospace",fontSize:15,color:playerVote===p?"#ff4d6d":"#888",cursor:"pointer",textAlign:"left",transition:"all 0.2s"}}>
                {p}
              </button>
            ))}
          </div>
          <button onClick={submitVotes} disabled={!playerVote||votingLoading}
            style={{width:"100%",background:!playerVote||votingLoading?"#2a2a38":"#ff4d6d",border:"none",borderRadius:12,padding:16,fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2,color:!playerVote||votingLoading?"#555":"#fff",cursor:!playerVote||votingLoading?"not-allowed":"pointer"}}>
            {votingLoading?"Tallying votes…":"Lock In Vote →"}
          </button>
        </div>
      )}

      {/* Imposter Guess Phase */}
      {phase==="imposterGuess"&&(()=>{
        if(!playerIsImposter&&!botGuessTriggered.current) triggerBotImposterGuess();
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(10,10,15,0.96)",display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"24px 16px",zIndex:100}}>
            <div style={{width:"100%",maxWidth:480,background:"#111118",border:"1px solid #222",borderRadius:20,padding:"28px 24px",display:"flex",flexDirection:"column",gap:18,marginBottom:24}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:2}}>🗳️ THE VOTES ARE IN</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {allVotes.map(({voter,voted})=>(
                  <div key={voter} style={{display:"flex",alignItems:"center",gap:8,background:"#0a0a0f",borderRadius:10,padding:"10px 14px",border:"1px solid #1a1a24"}}>
                    <span style={{fontSize:12,color:"#666",minWidth:60}}>{voter}</span>
                    <span style={{color:"#333",fontSize:11}}>voted</span>
                    <span style={{flex:1,fontSize:13}}>{voted}</span>
                  </div>
                ))}
              </div>
              <div style={{height:1,background:"#1e1e2a"}}/>
              <div style={{fontSize:13,color:"#aaa",lineHeight:1.5}}>
                {playerIsImposter?"🕵️ YOUR TURN — What was the secret word?":`🕵️ ${imposter} is guessing the secret word…`}
              </div>
              {playerIsImposter?(
                <div>
                  <div style={{display:"flex",gap:10}}>
                    <input autoFocus placeholder="Your guess…" value={playerWordGuess}
                      onChange={e=>{setPlayerWordGuess(e.target.value);setPlayerWordGuessError("");}}
                      onKeyDown={e=>e.key==="Enter"&&submitPlayerImposterGuess()} maxLength={32}
                      style={{flex:1,background:"#0a0a0f",border:"1px solid #2a2a38",borderRadius:10,padding:"12px 16px",fontFamily:"'DM Mono',monospace",fontSize:16,color:"#f0ede8",outline:"none"}}/>
                    <button onClick={submitPlayerImposterGuess} style={{background:"#ff4d6d",border:"none",borderRadius:10,padding:"12px 18px",fontSize:18,cursor:"pointer",color:"#fff"}}>→</button>
                  </div>
                  {playerWordGuessError&&<div style={{fontSize:11,color:"#ff4d6d",marginTop:6}}>{playerWordGuessError}</div>}
                  <div style={{fontSize:10,color:"#444",marginTop:8}}>One word — your best guess at the secret word</div>
                </div>
              ):(
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:14,color:"#888"}}>{imposter}</span>
                  {revealLoading?<span style={{fontSize:20,color:"#ff4d6d"}}>...</span>:<span style={{fontSize:12,color:"#555"}}>done</span>}
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* Reveal */}
      {phase==="reveal"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(10,10,15,0.96)",display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"24px 16px",zIndex:100}}>
          <div style={{width:"100%",maxWidth:480,background:"#111118",border:"1px solid #222",borderRadius:20,padding:"28px 24px",display:"flex",flexDirection:"column",gap:18,marginBottom:24}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,letterSpacing:2,textAlign:"center",padding:16,borderRadius:12,background:groupCaughtImposter?"#0f2a1a":"#2a0f13",color:groupCaughtImposter?"#4ade80":"#ff4d6d",border:`1px solid ${groupCaughtImposter?"#4ade8033":"#ff4d6d33"}`}}>
              {groupCaughtImposter?"🎯 IMPOSTER CAUGHT!":"😈 IMPOSTER ESCAPED!"}
            </div>
            <div style={{display:"flex",gap:12}}>
              {[{label:"IMPOSTER",val:<span style={{fontSize:15,color:"#ff4d6d",marginTop:2}}>{imposter}</span>},{label:"SECRET WORD",val:<span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:2}}>{word}</span>}].map(m=>(
                <div key={m.label} style={{flex:1,background:"#0a0a0f",border:"1px solid #1e1e2a",borderRadius:12,padding:"14px 16px",display:"flex",flexDirection:"column",gap:4}}>
                  <span style={{fontSize:9,letterSpacing:3,color:"#555"}}>{m.label}</span>
                  {m.val}
                </div>
              ))}
            </div>
            <div style={{fontSize:9,letterSpacing:3,color:"#555"}}>VOTES</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {allVotes.map(({voter,voted})=>(
                <div key={voter} style={{display:"flex",alignItems:"center",gap:8,background:"#0a0a0f",borderRadius:10,padding:"10px 14px",border:`1px solid ${voted===imposter?"#4ade8033":"#1a1a24"}`}}>
                  <span style={{fontSize:12,color:"#666",minWidth:60}}>{voter}</span>
                  <span style={{color:"#333",fontSize:11}}>→</span>
                  <span style={{flex:1,fontSize:13}}>{voted}</span>
                  <span style={{fontSize:16,color:voted===imposter?"#4ade80":"#ff4d6d"}}>{voted===imposter?"✓":"✗"}</span>
                </div>
              ))}
            </div>
            <div style={{fontSize:9,letterSpacing:3,color:"#555"}}>IMPOSTER'S WORD GUESS</div>
            <div style={{borderRadius:12,padding:"18px 20px",display:"flex",flexDirection:"column",gap:8,background:imposterGuessCorrect?"#0f2a1a":"#1a0f13",border:`1px solid ${imposterGuessCorrect?"#4ade8033":"#ff4d6d33"}`}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:2,color:imposterGuessCorrect?"#4ade80":"#ff4d6d"}}>"{imposterGuessedWord}"</div>
              <div style={{fontSize:13,color:imposterGuessCorrect?"#86efac":"#fca5a5"}}>
                {imposterGuessCorrect?"✓ Correct! They figured it out.":<span>✗ Wrong! The word was <strong style={{color:"#f0ede8"}}>{word}</strong></span>}
              </div>
            </div>
            <button onClick={()=>setPhase("setup")} style={{background:"#ff4d6d",border:"none",borderRadius:12,padding:16,fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2,color:"#fff",cursor:"pointer",width:"100%"}}>
              Play Again →
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
